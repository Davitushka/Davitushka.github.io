<section class="panel" id="playground" role="tabpanel">
  <h2 class="section-title" data-i18n="pg_title">Live log parser</h2>
  <p class="lead pg-lead" data-i18n="pg_lead">Paste a log line — format detection from thread-sync.</p>
  <div class="pg-examples">
    <button class="btn ghost sm" type="button" data-example="json" data-i18n="pg_ex_json">JSON event</button>
    <button class="btn ghost sm" type="button" data-example="cef" data-i18n="pg_ex_cef">CEF alert</button>
    <button class="btn ghost sm" type="button" data-example="syslog" data-i18n="pg_ex_syslog">Syslog line</button>
  </div>
  <textarea id="pgInput" class="pg-input" rows="4" spellcheck="false" placeholder='{"event":"login","user":"admin"}'></textarea>
  <button class="btn primary" type="button" id="pgParse" data-i18n="pg_parse">Parse</button>
  <div class="pipeline" id="pgPipeline" aria-hidden="true">
    <span class="pipeline-step" data-i18n="pg_step_ingest">ingest</span>
    <span class="pipeline-arrow">→</span>
    <span class="pipeline-step" data-i18n="pg_step_detect">detect</span>
    <span class="pipeline-arrow">→</span>
    <span class="pipeline-step" data-i18n="pg_step_normalize">normalize</span>
    <span class="pipeline-arrow">→</span>
    <span class="pipeline-step" data-i18n="pg_step_kafka">Kafka</span>
    <span class="pipeline-arrow">→</span>
    <span class="pipeline-step" data-i18n="pg_step_ch">ClickHouse</span>
  </div>
  <div class="pg-result" id="pgResult" hidden>
    <div class="pg-row">
      <span class="pg-label" data-i18n="pg_format">Detected format</span>
      <div id="pgFormat"></div>
    </div>
    <div class="pg-row">
      <span class="pg-label" data-i18n="pg_output">Normalized preview</span>
      <pre class="pg-output"><code id="pgOutput"></code></pre>
    </div>
  </div>
</section>
